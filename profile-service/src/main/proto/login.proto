syntax = "proto3";

package com.basic_chat;

option java_package = "com.basic_chat.proto";
option java_outer_classname = "LoginProto";

message TokenPair{
    string accessToken = 1;
    string refreshToken = 2;
}

// solicitud de registro.
message LoginRequest{
    string username = 1;
    string password = 2;
    string deviceId = 3;
}

// Respuesta de registro
message LoginResponse{
    bool success = 1;
    string message = 2;
    string userId = 3;
    TokenPair tokens = 4;
}


message LoginUser{
    oneof payload{
        LoginRequest register_request = 1;
        LoginResponse register_response = 2;
    }
}