spring.application.name=image-service
server.port=8086

# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/image_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456789
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Habilitar el manejo de multipart
spring.servlet.multipart.enabled=true

# Tamaño máximo por archivo
spring.servlet.multipart.max-file-size=10MB

# Tamaño máximo total de la solicitud
spring.servlet.multipart.max-request-size=10MB

# Directorio para guardar las imágenes (puedes cambiarlo)
file.upload-dir=C:/Users/rafae/uploads

auth.service.url=http://localhost:8083/

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest