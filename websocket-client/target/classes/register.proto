syntax = "proto3";

package com.pola;

option java_package = "com.pola.proto";
option java_outer_classname = "RegisterProto";

// solicitud de registro.
message RegisterRequest{
    string username = 1;
    string password = 2;
}

// Respuesta de registro
message RegisterResponse{
    bool success = 1;
    string message = 2;
    string userId = 3;
}

message RegisterUser{
    oneof payload{
        RegisterRequest register_request = 1;
        RegisterResponse register_response = 2;
    }
}