syntax = "proto3";

package com.pola;

option java_package = "com.pola.proto";
option java_outer_classname = "MessagesProto";

// Tipo de mensaje
enum MessageType {
  TEXT = 0;
  LOGIN = 1;
  LOGOUT = 2;
  USER_LIST = 3;
  TYPING = 4;
  DELIVERY_RECEIPT = 5;
  ALERT = 6;
  CHAT = 7;
}

// Mensaje de chat
message ChatMessage {
  string id = 1;
  MessageType type = 2;
  string sender = 3;
  string recipient = 4;
  string content = 5;
  int64 timestamp = 6;
}

// Mensaje de autenticación WebSocket
message AuthMessage {
    string token = 1;
}

// Respuesta de autenticación
message AuthResponse {
    bool success = 1;
    string message = 2;
    string userId = 3;
    string username = 4;
}

// Lista de usuarios
message UserList {
  repeated User users = 1;
}

// Usuario
message User {
  string id = 1;
  string username = 2;
  bool online = 3;
}

// Solicitud de eliminación de mensaje
message DeleteMessageRequest {
    string message_id = 1;
    string sender_username = 2;  // Para verificar permisos
}

// Respuesta de eliminación
message DeleteMessageResponse {
    bool success = 1;
    string message = 2;
    string message_id = 3;
}

// Notificación de mensaje eliminado
message MessageDeletedNotification {
    string message_id = 1;
    string deleted_by = 2;
}

// Wrapper para todos los mensajes
message WsMessage {
  oneof payload {
    ChatMessage chat_message = 1;
    UserList user_list = 2;
    AuthMessage auth_message = 3;
    AuthResponse auth_response = 4;
    DeleteMessageRequest delete_message_request = 5;
    DeleteMessageResponse delete_message_response = 6;
    MessageDeletedNotification message_delete_notification = 7;
  }
}