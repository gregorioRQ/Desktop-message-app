syntax = "proto3";

package com.pola;

option java_multiple_files = true;
option java_package = "com.pola.proto";
option java_outer_classname = "ImageData";

// ===== MENSAJES PARA HTTP (Imagen Completa) =====

message UploadImageRequest {
    string user_id = 1;
    string receiver_id = 2;
    bytes image_data = 3;          // Imagen completa en WebP
    string original_filename = 4;
    int32 original_width = 5;
    int32 original_height = 6;
}

message UploadImageResponse {
    bool success = 1;
    string media_id = 2;           // UUID del media
    string thumbnail_url = 3;      // URL para descargar thumbnail
    string full_image_url = 4;     // URL para descargar imagen completa
    int64 thumbnail_size = 5;      // Tamaño en bytes
    int64 full_image_size = 6;     // Tamaño en bytes
    string error_message = 7;      // Si success=false
}

message DownloadImageRequest {
    string media_id = 1;
    string user_id = 2;             // Para validar permisos
}

message DownloadImageResponse {
    bool success = 1;
    bytes image_data = 2;          // Imagen en WebP
    string mime_type = 3;          // "image/webp"
    int32 width = 4;
    int32 height = 5;
    string error_message = 6;
}

// ===== MENSAJES PARA WEBSOCKET (Thumbnail) =====

message ThumbnailMessage {
    string media_id = 1;           // Referencia al media
    string sender_id = 2;
    string receiver_id = 3;
    bytes thumbnail_data = 4;      // Thumbnail pequeño (8-15 KB)
    string full_image_url = 5;     // URL para descargar completa
    int32 original_width = 6;
    int32 original_height = 7;
    int64 file_size = 8;           // Tamaño de la imagen completa
    int64 timestamp = 9;
    MessageStatus status = 10;
}

enum MessageStatus {
    SENT = 0;
    DELIVERED = 1;
    READ = 2;
    FAILED = 3;
}

// ===== MENSAJES DE CONTROL WEBSOCKET =====

message ThumbnailAck {
    string media_id = 1;
    bool received = 2;
    int64 timestamp = 3;
}

message DeleteMediaRequest {
    string media_id = 1;
    string user_id = 2;
}

message DeleteMediaResponse {
    bool success = 1;
    string media_id = 2;
    string message = 3;
}