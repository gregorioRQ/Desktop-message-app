syntax = "proto3";

package com.pola;

option java_package = "com.pola.proto";
option java_outer_classname = "MessagesProto";

// Tipo de mensaje
enum MessageType {
  TEXT = 0;
  LOGIN = 1;
  LOGOUT = 2;
  USER_LIST = 3;
  TYPING = 4;
  DELIVERY_RECEIPT = 5;
  ALERT = 6;
  CHAT = 7;
}

// Mensaje de chat
message ChatMessage {
  string id = 1;
  MessageType type = 2;
  string sender = 3;
  string recipient = 4;
  string content = 5;
  int64 timestamp = 6;
}

// Mensaje de autenticación WebSocket
message AuthMessage {
    string token = 1;
    string user_id = 2;
    string username = 3;
}

// Respuesta de autenticación
message AuthResponse {
    bool success = 1;
    string message = 2;
    string userId = 3;
    string username = 4;
}

// Lista de usuarios
message UserList {
  repeated User users = 1;
}

message UnreadMessagesList {
  repeated ChatMessage messages = 1;
}

// Usuario
message User {
  string id = 1;
  string username = 2;
  bool online = 3;
}

// Solicitud de eliminación de mensaje
message DeleteMessageRequest {
    string message_id = 1;
    string sender_username = 2;
    string recipient = 3;  // Destinatario del mensaje original
}

// Respuesta de eliminación
message DeleteMessageResponse {
    bool success = 1;
    string message = 2;
    string message_id = 3;
}

// Solicitud de eliminacion de historial de mensaje entre dos usuarios
message ClearHistoryRequest {
  string sender = 1;
  string recipient = 2;
}

// Respuesta a peticion de eliminacion de historial
message ClearHistoryResponse {
  bool success = 1;
  string message = 2;
}

// Notificación de mensaje eliminado
message MessageDeletedNotification {
    string message_id = 1;
    string deleted_by = 2;
}

// Solicitud para bloquear contacto
// El blocker es el usuario que envía la solicitud de bloqueo
// El recipient es el usuario que será bloqueado
message BlockContactRequest {
    string blocker = 1;    // Usuario que envía la solicitud (quien bloquea)
    string recipient = 2; // Usuario que será bloqueado
}

// Respuesta de la operación de bloqueo
message BlockContactResponse {
    bool success = 1;
    string message = 2;
}

// Solicitud para desbloquear contacto
// El blocker es el usuario que envía la solicitud de desbloqueo
// El recipient es el usuario que será desbloqueado
message UnblockContactRequest {
    string blocker = 1;    // Usuario que envía la solicitud (quien desbloquea)
    string recipient = 2;  // Usuario que será desbloqueado
}

message UnblockContactResponse {
    bool success = 1;
    string message = 2;
}

// Error de envío
message MessageError {
    string message_id = 1;
    string error_message = 2;
    string recipient = 3;
}

// Causa del fallo en el envío de un mensaje
enum FailureCause {
    UNKNOWN_CAUSE = 0;
    BLOCKED = 1;
}

// Respuesta estructurada para el envío de mensajes
message ChatMessageResponse {
    string message_id = 1;
    bool success = 2;
    FailureCause cause = 3;
    string error_message = 4;
    string recipient = 5;
}

message UnblockedUsersList {
  repeated string users = 1;
}

message BlockedUsersList {
  repeated string users = 1;
}

// Solicitud para marcar mensajes como leidos
message MarkMessagesAsReadRequest {
  string sender = 1;
  string recipient = 2;
  repeated string message_ids = 3;
}

// Actualización enviada al remitente original cuando sus mensajes son leídos
message MessagesReadUpdate {
  repeated string message_ids = 1;
  string reader_username = 2;
}

message ContactIdentity {
  string sender_id = 1;      // El ID real (UUID) del remitente
  string sender_username = 2; // El username del remitente
  string contact_username = 3; // El username del contacto parcial
}

/**
 * Representa una solicitud pendiente de limpieza de historial entre dos usuarios.
 * Contiene los usernames del remitente que solicitó la limpieza y del destinatario
 * que debe aplicarla localmente cuando se conecte.
 */
message PendingClearHistory {
  string sender = 1;       // Username del usuario que solicitó la limpieza
  string recipient = 2;    // Username del usuario que debe aplicar la limpieza
}

/**
 * Lista de solicitudes pendientes de limpieza de historial.
 * Se envía durante la conexión inicial para notificar al cliente que debe
 * eliminar localmente el historial con los contactos especificados.
 */
message PendingClearHistoryList {
  repeated PendingClearHistory clear_histories = 1;
}

// Wrapper para todos los mensajes
message WsMessage {
  oneof payload {
    ChatMessage chat_message = 1;
    UserList user_list = 2;
    AuthMessage auth_message = 3;
    AuthResponse auth_response = 4;
    DeleteMessageRequest delete_message_request = 5;
    DeleteMessageResponse delete_message_response = 6;
    MessageDeletedNotification message_delete_notification = 7;
    UnreadMessagesList unread_messages_list = 8;
    ClearHistoryRequest clear_history_request = 9;
    BlockContactRequest block_contact_request = 10;
    BlockContactResponse block_contact_response = 11;
    MessageError message_error = 12;
    UnblockContactRequest unblock_contact_request = 13;
    UnblockContactResponse unblock_contact_response = 14;
    ChatMessageResponse chat_message_response = 15;
    UnblockedUsersList unblocked_users_list = 16;
    BlockedUsersList blocked_users_list = 17;
    MarkMessagesAsReadRequest mark_messages_as_read_request = 18;
    MessagesReadUpdate messages_read_update = 19;
    ContactIdentity contact_identity = 20;
    ClearHistoryResponse clear_history_response = 21;
    PendingClearHistoryList pending_clear_history_list = 22;
  }
}


