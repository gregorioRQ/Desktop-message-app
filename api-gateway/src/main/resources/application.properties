spring.application.name=api-gateway
# ==============================================================
# CONFIGURACIÓN GENERAL DEL GATEWAY
# ==============================================================
server.port=8080
spring.application.name=api-gateway

# ==============================================================
# CONFIGURACIÓN DE REDIS (DOCKER)
# ==============================================================
# Nombre del servicio en tu docker-compose o red de docker
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Descomentar si tu Redis tiene contraseña
# spring.data.redis.password=tu_password_seguro

# ==============================================================
# RUTAS DE SPRING CLOUD GATEWAY
# ==============================================================

# --- 0. HEARTBEAT (Controlador Local) ---
# IMPORTANTE: Esta ruta debe ir antes que profile-service para interceptar /heartbeat
# Usamos 'forward:' para enviar la petición al HeartbeatController dentro del Gateway
spring.cloud.gateway.server.webflux.routes[0].id=heartbeat-route
spring.cloud.gateway.server.webflux.routes[0].uri=forward:/api/v1/auth/heartbeat
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/heartbeat
spring.cloud.gateway.server.webflux.routes[0].filters[0]=AuthenticationFilter

# --- 1. PROFILE SERVICE (Autenticación y Perfiles) ---
# Movemos este servicio al indice 3 para dar prioridad al heartbeat
spring.cloud.gateway.server.webflux.routes[3].id=profile-service
# URL del contenedor Docker. Si usas Eureka, sería lb://profile-service
spring.cloud.gateway.server.webflux.routes[3].uri=${PROFILE_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=AuthenticationFilter

# --- 2. NOTIFICATION SERVICE ---
spring.cloud.gateway.server.webflux.routes[2].id=notification-service
spring.cloud.gateway.server.webflux.routes[2].uri=${NOTIFICATION_SERVICE_URL:ws://localhost:8084}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/ws/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=AuthenticationFilter

# --- 3. CHAT SERVICE (WEBSOCKET BINARIO) ---
spring.cloud.gateway.server.webflux.routes[1].id=chat-service
spring.cloud.gateway.server.webflux.routes[1].uri=${CHAT_SERVICE_URL:ws://localhost:8085}
# Ruta de conexión del socket (Handshake endpoint)
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/ws-binary/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=AuthenticationFilter

# --- 4. MEDIA SERVICE (REST HTTP) ---
spring.cloud.gateway.server.webflux.routes[4].id=media-service
spring.cloud.gateway.server.webflux.routes[4].uri=${MEDIA_SERVICE_URL:http://localhost:8089}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/media/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=AuthenticationFilter

# --- 5. MEDIA SERVICE (WEBSOCKET) ---
spring.cloud.gateway.server.webflux.routes[5].id=media-service
spring.cloud.gateway.server.webflux.routes[5].uri=${MEDIA_SERVICE_WS_URL:ws://localhost:8089}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/ws-media/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=AuthenticationFilter