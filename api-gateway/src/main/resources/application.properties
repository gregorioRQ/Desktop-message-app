spring.application.name=api-gateway
# ==============================================================
# CONFIGURACIÓN GENERAL DEL GATEWAY
# ==============================================================
server.port=8080

# ==============================================================
# CONFIGURACIÓN DE REDIS (DOCKER)
# ==============================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
# Descomentar si tu Redis tiene contraseña
# spring.data.redis.password=tu_password_seguro

# ==============================================================
# RUTAS DE SPRING CLOUD GATEWAY
# ==============================================================

# --- 1. PROFILE SERVICE (Autenticación y Perfiles) ---
spring.cloud.gateway.server.webflux.routes[0].id=profile-service
spring.cloud.gateway.server.webflux.routes[0].uri=${PROFILE_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=AuthenticationFilter

# --- 2. CONNECTION SERVICE (WebSocket binario unificado) ---
spring.cloud.gateway.server.webflux.routes[1].id=connection-service
spring.cloud.gateway.server.webflux.routes[1].uri=${CONNECTION_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/ws/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=AuthenticationFilter

# --- 3. NOTIFICATION SERVICE ---
spring.cloud.gateway.server.webflux.routes[2].id=notification-service
spring.cloud.gateway.server.webflux.routes[2].uri=${NOTIFICATION_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/ws-notifications/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=AuthenticationFilter

# --- 4. CHAT SERVICE (WEBSOCKET BINARIO - LEGACY) ---
spring.cloud.gateway.server.webflux.routes[3].id=chat-service
spring.cloud.gateway.server.webflux.routes[3].uri=${CHAT_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/ws-binary/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=AuthenticationFilter

# --- 5. CHAT SERVICE (REST - mensajes) ---
spring.cloud.gateway.server.webflux.routes[4].id=chat-service-rest
spring.cloud.gateway.server.webflux.routes[4].uri=${CHAT_SERVICE_REST_URL}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/messages/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=AuthenticationFilter
